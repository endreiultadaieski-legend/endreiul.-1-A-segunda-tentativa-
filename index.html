<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricultura Familiar Sustentável</title>
    <style>
        /* Configurações Gerais da Seção */
        .secao-informativa {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* Container Principal do Painel */
        .painel-abas {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        /* Inputs de Rádio Ocultos para Controlar as Abas */
        .painel-abas input[type="radio"] {
            display: none;
        }

        /* Menu de Navegação das Abas */
        .abas-nav {
            display: flex;
            background-color: #f9fbf9;
            border-bottom: 2px solid #e2ebd5;
        }

        .aba-label {
            flex: 1;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: #556b2f; /* Verde oliva escuro */
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .aba-label:hover {
            background-color: #edf3e8;
            color: #2e8b57; /* Verde mar comum */
        }

        /* Área de Conteúdo dos Textos */
        .conteudo-painel {
            padding: 35px;
            min-height: 200px;
        }

        .texto-conteudo {
            display: none; /* Esconde todos os textos inicialmente */
            line-height: 1.7;
            color: #333333;
            animation: suavizarEntrada 0.4s ease-in-out;
        }

        .texto-conteudo h2 {
            color: #2e8b57;
            margin-top: 0;
            font-size: 1.6rem;
            border-bottom: 2px solid #edf3e8;
            padding-bottom: 10px;
        }

        .texto-conteudo p {
            margin-bottom: 15px;
            text-align: justify;
        }

        /* Destaques visuais para dados importantes */
        .destaque-dado {
            background-color: #f0f7f4;
            border-left: 4px solid #2e8b57;
            padding: 12px 15px;
            margin: 20px 0;
            font-style: italic;
            color: #444;
        }

        /* Lógica CSS para Ativar as Abas */
        #aba1:checked ~ .abas-nav .aba-label[for="aba1"],
        #aba2:checked ~ .abas-nav .aba-label[for="aba2"],
        #aba3:checked ~ .abas-nav .aba-label[for="aba3"] {
            color: #2e8b57;
            background-color: #ffffff;
            border-bottom: 3px solid #2e8b57;
            font-weight: 700;
        }

        #aba1:checked ~ .conteudo-painel #conteudo-aba1,
        #aba2:checked ~ .conteudo-painel #conteudo-aba2,
        #aba3:checked ~ .conteudo-painel #conteudo-aba3 {
            display: block; /* Mostra apenas o texto ativo */
        }

        /* Animação de transição */
        @keyframes suavizarEntrada {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsividade para Celulares */
        @media (max-width: 600px) {
            .abas-nav {
                flex-direction: column;
            }
            .aba-label {
                border-bottom: 1px solid #e2ebd5;
                padding: 12px;
            }
            #aba1:checked ~ .abas-nav .aba-label[for="aba1"],
            #aba2:checked ~ .abas-nav .aba-label[for="aba2"],
            #aba3:checked ~ .abas-nav .aba-label
